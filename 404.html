    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafrex/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g. http://www.foo.com/one/two?a=b#c --> http://www.foo.com/?p=/one/two&q=a=b#c
      // Note: this script is for use in the index.html file in the
      // root directory of a GitHub Pages repository.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.length - l.search.length) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
