<div [formArrayName]="formArrayName" class="w-full px-4 py-2 bg-background border border-border-primary rounded-xl flex flex-wrap gap-2 items-center focus-within:ring-2 focus-within:ring-blue-500/20 focus-within:border-blue-500 transition-all">

    <!-- Chips -->
    <div class="flex flex-wrap gap-2">
        @for(tag of tags; track tag; let i = $index){
            <span class="flex items-center bg-surface border border-border-primary text-text-primary px-3 py-1 rounded-lg text-[11px] font-bold uppercase tracking-wider shadow-sm transition-all hover:border-blue-300 dark:hover:border-blue-700">
                {{ tag }}
                <input type="hidden" [formControlName]="i" />
                <button type="button" (click)="removeTag(i)" class="ml-2 text-text-muted hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </span>
        }
    </div>

    <!-- Input -->
    <input type="text" [formControl]="input" (keydown.enter)="onEnter($event)" placeholder="Add tag..."
        class="flex-1 min-w-30 outline-none border-none bg-transparent py-1 text-sm text-text-primary placeholder:text-text-muted focus:ring-0" />

    <!-- Add button -->
    <button type="button" (click)="addTag()" class="text-[11px] font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 px-2 py-1 transition-colors">
        Add
    </button>

</div>
