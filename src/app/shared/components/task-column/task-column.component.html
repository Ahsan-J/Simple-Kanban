<!-- TODO COLUMN -->
<div class="flex flex-col rounded-2xl bg-surface shadow-sm border border-border-primary overflow-hidden">

    <div class="flex items-center justify-between border-b border-border-secondary px-5 py-4 bg-surface/50 backdrop-blur-sm">
        <div class="flex items-center gap-3">
            <div class="h-2.5 w-2.5 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></div>
            <h2 class="font-bold text-text-primary uppercase tracking-wider text-xs">{{ column.title }}</h2>
            <span class="rounded-full bg-background px-2 py-0.5 text-[10px] font-bold text-text-secondary border border-border-primary">
                {{ tasks?.length }}
            </span>
        </div>

        <div class="flex items-center gap-1">
            <button (click)="addNewTask()" class="rounded-lg p-2 text-text-muted transition-colors hover:bg-surface-hover hover:text-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4v16m8-8H4" />
                </svg>
            </button>

            @if (!column.isSystemGenerated) {
                <button (click)="delete()" class="rounded-lg p-2 text-text-muted transition-colors hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            }
        </div>
    </div>
    <!-- Cards -->
    <div [id]="column.id" cdkDropList [cdkDropListData]="tasks" [cdkDropListConnectedTo]="connectedTo" (cdkDropListDropped)="drop($event)" class="flex-1 space-y-4 p-4 min-h-37.5">
        @for(task of tasks; track task.id) {
            <task-card cdkDrag [cdkDragData]="task" [task]="task"></task-card>
        }
        @empty {
        <create-task-placeholder (onAdd)="addNewTask()" />
        }
    </div>
</div>
