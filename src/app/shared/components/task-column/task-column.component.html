<!-- TODO COLUMN -->
<div class="flex flex-col rounded-2xl bg-white shadow-sm border border-slate-200">

    <div class="flex items-center justify-between border-b border-slate-100 px-5 py-4">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-slate-400"></div>
            <h2 class="font-semibold text-slate-700">{{ column.title }}</h2>
            <span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-600">
                {{ tasks?.length }}
            </span>
        </div>

        <button class="rounded-lg p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6h.01M12 12h.01M12 18h.01" />
            </svg>
        </button>
    </div>
    <!-- Cards -->
    <div [id]="column.id" cdkDropList [cdkDropListData]="tasks" [cdkDropListConnectedTo]="connectedTo" (cdkDropListDropped)="drop($event)" class="flex-1 space-y-4 p-4">
        @for(task of tasks; track task.id) {
            <task-card cdkDrag [cdkDragData]="task" [task]="task"></task-card>
        }
        @empty {
        <create-task-placeholder />
        }
    </div>
</div>
