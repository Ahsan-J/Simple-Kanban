<app-modal title="My Tailwind Modal">
  <form [formGroup]="createTaskForm" (ngSubmit)="addTask()" class="flex flex-col gap-4">
    <input type="text" placeholder="Title" formControlName="title"
      class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
    <textarea placeholder="Description" formControlName="description"
      class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
    <input type="datetime-local" placeholder="Due date" formControlName="dueAt" class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
           text-gray-900 shadow-sm outline-none transition
           focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />

    <combobox [tags]="tagValues" formArrayName="tags" (onAddTag)="addTag($event)" (onRemoveTag)="removeTag($event)" />

    <select formControlName="columnId" class="w-full rounded-md border border-gray-300 bg-white px-4 py-2 text-gray-700 shadow-sm
           focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="" disabled>-- Select --</option>
      @for(c of columnList$ | async; track c.id) {
        <option [value]="c.id">
          {{ c.title }}
        </option>
      }
    </select>

    <div class="flex justify-end gap-2 border-t border-gray-100 p-4">
      <button class="px-4 py-2 rounded bg-gray-200 hover:bg-gray-300" (click)="closeAddTaskModal()">
        Cancel
      </button>

      <button type="submit" class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">
        Create
      </button>
    </div>
  </form>
</app-modal>
