<!-- Board Container -->
<div class="relative min-h-[calc(100vh-12rem)]">
    <!-- Subtle Background Pattern -->
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] dark:bg-[radial-gradient(#1e293b_1px,transparent_1px)] bg-size-[24px_24px] mask-[radial-gradient(ellipse_50%_50%_at_50%_50%,#000_70%,transparent_100%)]"></div>

    <!-- Board Content -->
    <div class="pb-8">
        <!-- Mobile Tab Navigation (Visible only on small screens) -->
        <div class="mb-6 flex gap-2 overflow-x-auto pb-2 md:hidden scrollbar-hide">
            @for(column of columnList; track column.id) {
                <button (click)="setActiveColumn(column.id)"
                    [class.bg-blue-600]="activeColumnId() === column.id"
                    [class.text-white]="activeColumnId() === column.id"
                    [class.bg-surface]="activeColumnId() !== column.id"
                    [class.text-text-secondary]="activeColumnId() !== column.id"
                    class="whitespace-nowrap rounded-xl px-5 py-2.5 text-xs font-bold uppercase tracking-wider border border-border-primary shadow-sm transition-all active:scale-95">
                    {{ column.title }} ({{ getTasks(column.id).length }})
                </button>
            }
            <button (click)="openAddColumnModal()"
                class="flex items-center justify-center rounded-xl bg-surface px-4 py-2.5 text-text-muted border border-border-primary border-dashed hover:border-blue-500/50 hover:text-blue-500 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>

        <!-- Desktop & Mobile Column View -->
        <div class="flex gap-8 overflow-x-auto scrollbar-hide">
            @for(column of columnList; track column.id) {
                <task-column
                    [class.hidden]="activeColumnId() !== column.id"
                    class="md:block min-w-[320px] max-w-[320px] shrink-0"
                    [connectedColumn]="getConnectedColumns(column.id)" 
                    [column]="column" 
                    [tasks]="getTasks(column.id)" 
                    (onDrop)="onDrop($event, column.id)"
                    (onAddTask)="openAddTaskModal($event)"
                    (onDelete)="deleteColumn($event)" />
            }

            <!-- Desktop-only Add Column Button -->
            <div class="hidden md:block min-w-[320px] max-w-[320px] shrink-0 h-fit">
                <button (click)="openAddColumnModal()" 
                    class="group w-full flex items-center justify-center gap-3 rounded-2xl border-2 border-dashed border-border-primary p-6 transition-all hover:border-blue-500/50 hover:bg-surface-hover/50">
                    <div class="flex h-10 w-10 items-center justify-center rounded-xl border border-border-primary bg-surface transition-all group-hover:border-blue-500/50 group-hover:scale-110">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-text-muted group-hover:text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold uppercase tracking-wider text-text-muted group-hover:text-blue-500 transition-colors">Add Column</span>
                </button>
            </div>
        </div>
    </div>
</div>

<create-task-form-modal />
<create-column-form-modal />
